<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Buddhist food-term geography prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
    #map { height: 100vh; }
    .note { position: absolute; z-index: 999; top: 12px; left: 56px; max-width: 430px; background: rgba(255,255,255,0.92); padding: 10px 12px; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.25); font-size: 13px; }
  </style>
</head>
<body>
  <div class="note"><strong>Prototype map.</strong> Marker locations are translation/redaction metadata from CBETA and a Sri Lanka centroid for the Pāli Vinaya. They are evidence anchors, not exact composition sites. Marker size follows total food-term mentions.</div>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([23, 91], 4);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    L.circleMarker([32.062352, 118.801793], {radius: 30.36, color: '#7b3294', fillColor: '#c2a5cf', fillOpacity: 0.65}).addTo(map).bindPopup("\n        <strong>T1421: 彌沙塞部和醯五分律 / Mahīśāsaka Vinaya (Five-Part Vinaya)</strong><br>\n        School: Mahīśāsaka<br>\n        CBETA/SuttaCentral location: 龍光寺<br>\n        <em>northwest/central India (trad. Mahīśāsaka transmission). Chinese translation metadata is from CBETA /works; Indic association is contextual, not an API geocode.</em>\n        <ul><li>飯 / cooked rice/meal: 74 (2.14 per 10k chars)</li><li>肉 / meat: 71 (2.05 per 10k chars)</li><li>蜜 / honey: 61 (1.76 per 10k chars)</li><li>酥 / ghee/butter: 55 (1.59 per 10k chars)</li><li>油 / oil: 48 (1.39 per 10k chars)</li><li>粥 / gruel/congee: 39 (1.13 per 10k chars)</li><li>乳 / milk: 33 (0.95 per 10k chars)</li><li>餅 / cake/bread: 28 (0.81 per 10k chars)</li></ul>\n        ");
L.circleMarker([32.403425, 119.432292], {radius: 47.18, color: '#7b3294', fillColor: '#c2a5cf', fillOpacity: 0.65}).addTo(map).bindPopup("\n        <strong>T1425: 摩訶僧祇律 / Mahāsāṃghika Vinaya</strong><br>\n        School: Mahāsāṃghika<br>\n        CBETA/SuttaCentral location: 天寧寺<br>\n        <em>Andhra / broader early Mahāsāṃghika transmission. Chinese translation metadata is from CBETA /works; Indic association is contextual, not an API geocode.</em>\n        <ul><li>飯 / cooked rice/meal: 208 (3.69 per 10k chars)</li><li>蜜 / honey: 205 (3.64 per 10k chars)</li><li>油 / oil: 203 (3.61 per 10k chars)</li><li>肉 / meat: 151 (2.68 per 10k chars)</li><li>酥 / ghee/butter: 141 (2.50 per 10k chars)</li><li>漿 / drink/syrup: 128 (2.27 per 10k chars)</li><li>餅 / cake/bread: 90 (1.60 per 10k chars)</li><li>粥 / gruel/congee: 84 (1.49 per 10k chars)</li></ul>\n        ");
L.circleMarker([36.275200, 114.389000], {radius: 42.84, color: '#7b3294', fillColor: '#c2a5cf', fillOpacity: 0.65}).addTo(map).bindPopup("\n        <strong>T1428: 四分律 / Dharmaguptaka Vinaya (Four-Part Vinaya)</strong><br>\n        School: Dharmaguptaka<br>\n        CBETA/SuttaCentral location: 中寺<br>\n        <em>Gandhāra / northwest India (Dharmaguptaka transmission). Chinese translation metadata is from CBETA /works; Indic association is contextual, not an API geocode.</em>\n        <ul><li>飯 / cooked rice/meal: 266 (3.55 per 10k chars)</li><li>肉 / meat: 154 (2.06 per 10k chars)</li><li>蜜 / honey: 114 (1.52 per 10k chars)</li><li>油 / oil: 111 (1.48 per 10k chars)</li><li>酥 / ghee/butter: 111 (1.48 per 10k chars)</li><li>乳 / milk: 96 (1.28 per 10k chars)</li><li>粥 / gruel/congee: 80 (1.07 per 10k chars)</li><li>漿 / drink/syrup: 75 (1.00 per 10k chars)</li></ul>\n        ");
L.circleMarker([32.574700, 116.786000], {radius: 47.15, color: '#7b3294', fillColor: '#c2a5cf', fillOpacity: 0.65}).addTo(map).bindPopup("\n        <strong>T1435: 十誦律 / Sarvāstivāda Vinaya (Ten-Recitation Vinaya)</strong><br>\n        School: Sarvāstivāda<br>\n        CBETA/SuttaCentral location: 石澗寺<br>\n        <em>Kashmir / northwest India (Sarvāstivāda transmission). Chinese translation metadata is from CBETA /works; Indic association is contextual, not an API geocode.</em>\n        <ul><li>肉 / meat: 253 (3.08 per 10k chars)</li><li>飯 / cooked rice/meal: 221 (2.69 per 10k chars)</li><li>酥 / ghee/butter: 153 (1.86 per 10k chars)</li><li>粥 / gruel/congee: 151 (1.84 per 10k chars)</li><li>油 / oil: 149 (1.81 per 10k chars)</li><li>蜜 / honey: 135 (1.64 per 10k chars)</li><li>乳 / milk: 86 (1.05 per 10k chars)</li><li>餅 / cake/bread: 82 (1.00 per 10k chars)</li></ul>\n        ");
L.circleMarker([34.236717, 108.914578], {radius: 34.40, color: '#7b3294', fillColor: '#c2a5cf', fillOpacity: 0.65}).addTo(map).bindPopup("\n        <strong>T1442: 根本說一切有部毘奈耶 / Mūlasarvāstivāda Vinaya</strong><br>\n        School: Mūlasarvāstivāda<br>\n        CBETA/SuttaCentral location: 西明寺<br>\n        <em>north India / Kashmir-linked Mūlasarvāstivāda transmission. Chinese translation metadata is from CBETA /works; Indic association is contextual, not an API geocode.</em>\n        <ul><li>飯 / cooked rice/meal: 141 (2.99 per 10k chars)</li><li>肉 / meat: 82 (1.74 per 10k chars)</li><li>餅 / cake/bread: 75 (1.59 per 10k chars)</li><li>乳 / milk: 70 (1.48 per 10k chars)</li><li>油 / oil: 63 (1.33 per 10k chars)</li><li>魚 / fish: 58 (1.23 per 10k chars)</li><li>漿 / drink/syrup: 35 (0.74 per 10k chars)</li><li>酥 / ghee/butter: 33 (0.70 per 10k chars)</li></ul>\n        ");
L.circleMarker([7.873100, 80.771800], {radius: 25.92, color: '#7b3294', fillColor: '#c2a5cf', fillOpacity: 0.65}).addTo(map).bindPopup("\n        <strong>pli-tv: Theravāda Vinayapiṭaka (SuttaCentral Bilara root text)</strong><br>\n        School: Theravāda<br>\n        CBETA/SuttaCentral location: Sri Lanka (textual redaction/preservation convention)<br>\n        <em>Pāli Vinaya root text; coordinates are country centroid for Sri Lanka and should not be read as a precise composition site.</em>\n        <ul><li>sappi / ghee/butter: 74 (0.19 per 10k chars)</li><li>yāgu / gruel/congee: 52 (0.13 per 10k chars)</li><li>tela / oil: 47 (0.12 per 10k chars)</li><li>madhu / honey: 36 (0.09 per 10k chars)</li><li>phāṇita / sugar: 28 (0.07 per 10k chars)</li><li>khīra / milk: 25 (0.06 per 10k chars)</li><li>pūva / cake/bread: 23 (0.06 per 10k chars)</li><li>odana / cooked rice/meal: 17 (0.04 per 10k chars)</li></ul>\n        ");
  </script>
</body>
</html>
